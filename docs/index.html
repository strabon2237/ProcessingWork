<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .github-link {
            margin: 10px 0;
            font-size: 14px;
        }
        .github-link a {
            color: #0077cc;
            text-decoration: none;
        }
        .github-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Animations</a> |
        <a href="ProcessFlowDiagrams.html">Process Flow Diagrams</a> |
        <a href="McCabe.html">McCabe-Thiele</a>
    </nav>

    <!-- GitHub repository link -->
    <div class="github-link">
        View the repository on 
        <a href="https://github.com/strabon2237/strabon2237.github.io" target="_blank">GitHub</a>
    </div>

    <h1>My Video Gallery</h1>
    <div class="gallery" id="gallery"></div>

    <script>
        const videos = [
            "CannonLauncher.mp4",
            "LavaLampParticles.mp4",
            "FirstOrderKineticsCollisionModelling.mp4",
            "SecondOrderKineticsCollisionModelling.mp4",
            "HighDampinField.mp4",
            "LowDampingField.mp4",
            "KillandFeedRatioCHangedViaInterpolation.mp4",
            "KillandFeedRatioChangedViaNoise.mp4",
            "ConstantFeedandKill.mp4" 
        ];

        const gallery = document.getElementById("gallery");

        videos.forEach(video => {
            const container = document.createElement("div");
            container.className = "video-container";

            const vid = document.createElement("video");
            vid.src = video;
            vid.controls = true;

            const caption = document.createElement("p");
            caption.innerText = video.split("/").pop();

            container.appendChild(vid);
            container.appendChild(caption);
            gallery.appendChild(container);
        });
    </script>
</body>
</html>
